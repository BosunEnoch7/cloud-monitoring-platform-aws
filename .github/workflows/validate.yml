name: Validate platform

on:
  pull_request:
    paths:
      - ".github/**"
      - "alertmanager/**"
      - "docker/**"
      - "grafana/**"
      - "prometheus/**"
      - "scripts/**"
      - "terraform/**"
  push:
    branches:
      - main
    paths:
      - ".github/**"
      - "alertmanager/**"
      - "docker/**"
      - "grafana/**"
      - "prometheus/**"
      - "scripts/**"
      - "terraform/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5
          terraform_wrapper: false

      - name: Configure provider cache
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: terraform-${{ runner.os }}-${{ hashFiles('terraform/environments/dev/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-${{ runner.os }}-

      - name: Check formatting
        working-directory: terraform
        run: terraform fmt -check -recursive -diff

      - name: Initialize without backend
        working-directory: terraform/environments/dev
        run: terraform init -backend=false -lockfile=readonly

      - name: Validate Terraform
        working-directory: terraform/environments/dev
        run: terraform validate -no-color

  monitoring:
    name: Monitoring configuration
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Compose, Prometheus, and Alertmanager
        run: bash scripts/validate-monitoring.sh

      - name: Validate Grafana dashboard JSON
        run: |
          jq --exit-status '
            .uid != null
            and .title != null
            and (.panels | length > 0)
          ' grafana/dashboards/platform-overview.json >/dev/null

  security:
    name: Infrastructure security scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Scan infrastructure configuration
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          hide-progress: true
