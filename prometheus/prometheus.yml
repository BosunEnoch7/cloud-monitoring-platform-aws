global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: cloud-monitoring-platform-aws
    environment: dev

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          service: monitoring-host

  - job_name: cadvisor
    scrape_interval: 30s
    static_configs:
      - targets:
          - cadvisor:8080
        labels:
          service: docker

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093
