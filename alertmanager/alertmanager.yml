global:
  resolve_timeout: 5m

route:
  receiver: slack-warning
  group_by:
    - alertname
    - instance
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: slack-critical
      matchers:
        - severity="critical"
      repeat_interval: 1h
    - receiver: slack-warning
      matchers:
        - severity="warning"

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - alertname
      - instance

receivers:
  - name: slack-warning
    slack_configs:
      - api_url_file: /run/secrets/slack_webhook_url
        channel: "#platform-alerts"
        username: Alertmanager
        icon_emoji: ":warning:"
        send_resolved: true
        title: '{{ .Status | toUpper }}: {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts -}}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook_url }}
          {{ end }}

  - name: slack-critical
    slack_configs:
      - api_url_file: /run/secrets/slack_webhook_url
        channel: "#platform-alerts"
        username: Alertmanager
        icon_emoji: ":rotating_light:"
        send_resolved: true
        title: '{{ .Status | toUpper }}: {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts -}}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook_url }}
          {{ end }}
